<!DOCTYPE html>
<html>
<head>
    <title>Job Details</title>
</head>
<body>

<h1>{{ job.title }} at {{ job.company }}</h1>

<p><strong>Location:</strong> {{ job.location }}</p>
<p><strong>Status:</strong> {{ job.status }}</p>
<p><strong>Source:</strong> {{ job.source }}</p>
<p><strong>URL:</strong>
<a href="{{ job.job_url }}">{{ job.job_url }}</a>
</p>
<p><strong>Match Score:</strong> {{ job.score }}</p>
<p><strong>Date Found:</strong> {{ job.date_found }}</p>

<br><br>
<a href="/edit/{{ job.id }}">Edit Job</a><br><br>
<form method="post" action="/update_status/{{ job.id }}">
<label>Change Status:</label><br>
<select name="status">
<option value="NEW">NEW</option>
<option value="APPLIED">APPLIED</option>
<option value="HR_ROUND">HR_ROUND</option>
<option value="TECHNICAL">TECHNICAL</option>
<option value="FINAL">FINAL</option>
<option value="OFFER">OFFER</option>
<option value="REJECTED">REJECTED</option>
</select>
<button type="submit">Update Status</button>
</form><br>

<a href="/">Back to Dashboard</a>

</body>
</html>
