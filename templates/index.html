<!DOCTYPE html>
<html>
<head>
    <title>Personal ATS</title>
</head>
<body>

<h1>Personal ATS</h1>

<h2>Dashboard</h2>

<ul>
    <li>Total Jobs: {{ total_jobs }}</li>
    <li>Applied: {{ applied_jobs }}</li>
    <li>New: {{ new_jobs }}</li>
    <li>Offers: {{ offer_jobs }}</li>
</ul>

<form method="GET">

    <input
        type="text"
        name="search"
        placeholder="Search jobs..."
        value="{{ search }}"
    >

    <select name="status">
        <option value="">All</option>
        <option value="NEW">NEW</option>
        <option value="APPLIED">APPLIED</option>
        <option value="OFFER">OFFER</option>
        <option value="REJECTED">REJECTED</option>
    </select>

    <button type="submit">Search</button>

</form>

<h2>Jobs</h2>

<table border="1">

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Company</th>
    <th>Location</th>
    <th>Status</th>
</tr>

{% for job in jobs %}
<tr>
    <td>{{ job[0] }}</td>
    <td><a href="/job/{{ job[0] }}">{{ job[1] }}</a></td>
    <td>{{ job[2] }}</td>
    <td>{{ job[3] }}</td>
    <td>{{ job[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
